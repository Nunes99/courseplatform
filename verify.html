<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#00365B">
  <title>LMTWEBNAIRS Summer School | Verificação</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
  <script>
    (() => {
      const saved = localStorage.getItem('lssTheme');
      const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.theme = saved || (prefersDark ? 'dark' : 'light');
    })();
  </script>
  <link rel="stylesheet" href="./assets/css/styles.css">
  <script defer src="./config.js"></script>
  <script type="module" src="./verify.js"></script>
</head>
<body>
  <main class="page-shell">
    <section class="verification-shell">
      <p class="eyebrow">LMTWEBNAIRS Summer School</p>
      <h1>Verificar certificado</h1>
      <p>Introduza o número completo ou o código de verificação.</p>

      <form id="verificationForm" class="verification-form">
        <input name="code" required placeholder="EAPI-2026-000001">
        <button class="button button-primary" type="submit">Verificar</button>
      </form>

      <div id="verificationResult"></div>
    </section>
  </main>
</body>
</html>
