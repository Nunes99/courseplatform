<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#00365B">
  <meta name="description" content="Plataforma digital da LMTWEBNAIRS Summer School 2026.">
  <title>LMTWEBNAIRS Summer School 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <script>
    (() => {
      const saved = localStorage.getItem('lssTheme');
      const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.theme = saved || (prefersDark ? 'dark' : 'light');
    })();
  </script>
  <link rel="stylesheet" href="./assets/css/styles.css">

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']]
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script defer src="./config.js"></script>
  <script type="module" src="./app.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="site-brand">
      <span class="site-brand-symbol">LSS</span>
      <span class="site-brand-copy">
        <strong>LMTWEBNAIRS</strong>
        <small>Summer School 2026</small>
      </span>
    </div>

    <div class="site-header-actions">
      <span class="header-user" id="headerUser"></span>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Alternar modo claro e escuro">
        <span class="theme-toggle-icon" aria-hidden="true">☀</span>
      </button>
      <button class="text-button" id="logoutButton" type="button" hidden>Sair</button>
    </div>
  </header>

  <main id="app" class="page-shell"></main>
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>
</body>
</html>
