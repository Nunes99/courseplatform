<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#00365B">
  <meta name="robots" content="noindex,nofollow">
  <title>LMTWEBNAIRS Summer School | Painel do Avaliador</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
  <script>
    (() => {
      const saved = localStorage.getItem('lssTheme');
      const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.theme = saved || (prefersDark ? 'dark' : 'light');
    })();
  </script>
  <link rel="stylesheet" href="./assets/css/styles.css">
  <script defer src="./config.js"></script>
  <script type="module" src="./admin.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="site-brand">
      <span class="site-brand-symbol">LSS</span>
      <span class="site-brand-copy">
        <strong>LMTWEBNAIRS</strong>
        <small>Painel do avaliador</small>
      </span>
    </div>

    <div class="site-header-actions">
      <span class="header-user" id="adminIdentity"></span>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Alternar modo claro e escuro">
        <span class="theme-toggle-icon" aria-hidden="true">☀</span>
      </button>
      <button class="text-button" id="adminLogoutButton" type="button" hidden>Sair</button>
    </div>
  </header>

  <main id="adminApp" class="page-shell"></main>
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>
</body>
</html>
